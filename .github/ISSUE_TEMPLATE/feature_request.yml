name: ✨ 功能请求
description: 提出一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请尽可能详细地描述你的需求，以便我们评估和实现。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述你在什么场景下需要这个功能，它能解决什么问题？
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 期望行为
      description: 描述这个功能应该如何工作

  - type: textarea
    id: api-design
    attributes:
      label: API 设计建议
      description: 如果你有具体的 API 设计想法，请在此描述
      render: swift

  - type: dropdown
    id: language
    attributes:
      label: 适用语言
      description: 这个功能应该支持哪种语言？
      options:
        - Objective-C
        - Swift
        - 两者都需要
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？如果有，请描述

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他你认为有助于理解需求的信息
